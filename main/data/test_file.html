<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Calamity Kitten's Crate Controller</title>
</head>
<body>

	<div id="slider">
		<p>Brightness (Recommend at least 25 to reduce stuttering)</p>
		<input type="range" id="brightnessInput" min="0" max="255" value="1" onchange=""/>
		<output id="brightnessOutput">1</output>
	</div>

	<script>
		var varBrightnessInput = document.getElementById("brightnessInput");

		function httpGet(theUrl)
		{
			var xmlHttp = new XMLHttpRequest();
			xmlHttp.open( "GET", theUrl, false ); // false for synchronous request
			xmlHttp.send( null );
			return xmlHttp.responseText;
		}

		function getBrightnessValue() {
			var request = httpGet("http://192.168.5.246/brightness");
			brightnessOutput.value = request;
			varBrightnessInput.value = request;
			return request;
		}

		varBrightnessInput.addEventListener('mouseup', function() {
			brightnessOutput.value = httpGet("http://192.168.5.246/brightness/" + varBrightnessInput.value);
		});

		getBrightnessValue();
	</script>

</body>
</html>
