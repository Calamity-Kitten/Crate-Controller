<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Calamity Kitten's Crate Controller</title>

	<!-- <style>div {opacity: 0;}</style> -->
	<link rel="stylesheet" type="text/css" href="style.css">

	<script src="settings.js" async></script>
</head>
<body>
	<div class="header">
		<h1>Calamity Kitten's Crate Controller</h1>
	</div>
	<div id="navbar">
		<a class="navbarlinks">Status</a>
		<a class="navbarlinks" href="/">Report</a>
		<a class="navbarlinks active" href="/Settings">Settings</a>
	</div>
	<div class = "content">
		<div class="setting" id="brightness">
			<label>Brightness:</label><input type="range" id="brightnessInput" min="%MINIMUM_BRIGHTNESS%" max="%MAXIMUM_BRIGHTNESS%" value="%BRIGHTNESS%">
		</div>

		<div class="setting" id="game-mode">
			<label>Game Mode:</label>
			<select id="gameModeInput">
				<option value="0" %GAMEMODE_0%>Off</option>
				<option value="1" %GAMEMODE_1%>Basic (static time)</option>
				<option value="2" %GAMEMODE_2%>Basic (random time)</option>
			</select>
		</div>

		<div class="setting" id="minimum-time">
			<label>Minimum wait time:</label>
			<input type="range" id="minimumTimeInput" min="%MINIMUM_TIME_MIN%" max="%MINIMUM_TIME_MAX%" value="%MINIMUM_TIME%">
		</div>

		<div class="setting">
			<label>Maximum wait time:</label>
			<input type="range" id="maximumTimeInput" min="%MAXIMUM_TIME_MIN%" max="%MAXIMUM_TIME_MAX%" value="%MAXIMUM_TIME%">
		</div>

		<div class="setting">
			<label>Static wait time:</label>
			<input type="range" id="staticTimeInput" min="%STATIC_TIME_MIN%" max="%STATIC_TIME_MAX%" value="%STATIC_TIME%">
		</div>

		<div class="setting" id="color-mode">
			<label>Color Mode:</label>
			<select id="colorModeInput">
				<option value="0" %COLORMODE_0%>Rainbow</option>
				<option value="1" %COLORMODE_1%>Static Color</option>
			</select>
		</div>

		<div class="setting" id="color">
			<label>Color:</label>
			<input type="color" id="colorInput" value="rgb(%COLOR_RED%, %COLOR_GREEN%, %COLOR_BLUE%)">
		</div>

		<div class="setting">
			<button id="submit">Submit</button>
		</div>
	</div>
</body>
</html>
