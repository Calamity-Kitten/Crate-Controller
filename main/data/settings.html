<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Calamity Kitten's Crate Controller</title>
	<!-- <style>body {background-color: black;} .setting {display: none;}</style> -->

	<link rel="stylesheet" type="text/css" href="style.css">

	<script src="settings.js" defer></script>

</head>
<body>

	<div class="setting" id="brightness">
		<label>Brightness:</label>
		<input type="range" id="brightnessInput" min="%MINIMUM_BRIGHTNESS%" max="%MAXIMUM_BRIGHTNESS%" value="%BRIGHTNESS%">
		<output id="brightnessOutput">%BRIGHTNESS%</output>
	</div>

	<div class="setting" id="game-mode">
		<label>Game Mode:</label>
		<select id="gameModeInput">
			<option value="0">Off</option>
			<option value="1">Basic (static time)</option>
			<option value="2">Basic (random time)</option>
		</select>
	</div>

	<div class="setting" id="minimum-time">
		<label>Minimum wait time:</label>
		<input type="range" id="minimumTimeInput" min="%MINIMUM_TIME_MIN%" max="%MINIMUM_TIME_MAX%" value="%MINIMUM_TIME%">
		<output id="minimumTimeOutput">%MINIMUM_TIME%</output>
	</div>

	<div class="setting">
		<label>Maximum wait time:</label>
		<input type="range" id="maximumTimeInput" min="%MAXIMUM_TIME_MIN%" max="%MAXIMUM_TIME_MAX%" value="%MAXIMUM_TIME%">
		<output id="maximumTimeOutput">%MAXIMUM_TIME%</output>
	</div>

	<div class="setting">
		<label>Static wait time:</label>
		<input type="range" id="staticTimeInput" min="%STATIC_TIME_MIN%" max="%STATIC_TIME_MAX%" value="%STATIC_TIME%">
		<output id="staticTimeOutput">%STATIC_TIME%</output>
	</div>

	<div class="setting">
		<button id="submit">Submit</button>
	</div>	
</body>
</html>
