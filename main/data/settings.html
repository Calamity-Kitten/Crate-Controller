<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Calamity Kitten's Crate Controller</title>
	<style>body {background-color: black;}</style>

	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

	<div class="setting" id="slider">
		<label>Brightness:</label>
		<input type="range" id="brightnessInput" min="25" max="255" value="100">
		<output id="brightnessOutput">1</output>
	</div>

	<div class="setting" id="slider">
		<label>Minimum wait time:</label>
		<input type="range" id="minimumTimeInput" min="1" max="15" value="1">
		<output id="minimumTimeOutput">1</output>
	</div>

	<div class="setting" id="slider">
		<label>Maximum wait time:</label>
		<input type="range" id="maximumTimeInput" min="1" max="15" value="1">
		<output id="maximumTimeOutput">1</output>
	</div>

	<script src="settings.js" defer></script>
</body>
</html>
